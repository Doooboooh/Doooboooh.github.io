<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doooboooh</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 60px 20px;
        }
        h1 {
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .bio {
            color: #666;
            margin-bottom: 24px;
        }
        .links {
            margin-bottom: 32px;
        }
        .links a {
            color: #333;
            text-decoration: none;
            margin-right: 16px;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .section {
            margin-bottom: 32px;
        }
        .section-title {
            font-size: 0.9em;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .project {
            margin-bottom: 12px;
        }
        .project a {
            color: #333;
            text-decoration: none;
        }
        .project a:hover {
            text-decoration: underline;
        }
        .project-desc {
            font-size: 0.9em;
            color: #666;
        }
        footer {
            margin-top: 48px;
            font-size: 0.85em;
            color: #999;
        }
    </style>
</head>
<body>
    <h1>Doooboooh</h1>
    <p class="bio">开发者</p>
    
    <div class="links">
        <a href="https://github.com/Doooboooh" target="_blank">GitHub</a>
        <!-- 可以添加更多链接 -->
        <!-- <a href="mailto:your@email.com">Email</a> -->
        <!-- <a href="https://twitter.com/yourhandle" target="_blank">Twitter</a> -->
    </div>

    <div class="section">
        <div class="section-title">项目</div>
        <div class="project">
            <a href="https://github.com/Doooboooh?tab=repositories" target="_blank">查看我的所有仓库 →</a>
        </div>
        <!-- 可以添加具体项目 -->
        <!--
        <div class="project">
            <a href="#">项目名称</a>
            <p class="project-desc">简短描述</p>
        </div>
        -->
    </div>

    <footer>
        Doooboooh © 2026
    </footer>
</body>
</html>
